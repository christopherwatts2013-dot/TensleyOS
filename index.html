<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tensley OS 3</title>
<style>
  body { margin:0; font-family:sans-serif; background:#000; color:#eee; overflow:hidden; }

  /* Screens */
  #setup-screen, #login-screen, #os-shell {
    position:absolute; inset:0;
  }

  /* Setup screen */
  #setup-screen {
    background: radial-gradient(circle at top, #3a7bd5, #000);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .setup-card {
    width:480px;
    background:#111;
    border-radius:12px;
    padding:20px 24px;
    box-shadow:0 0 20px #000;
  }
  .setup-title {
    font-size:22px;
    margin-bottom:10px;
  }
  .setup-step {
    margin-top:10px;
  }
  .setup-step label {
    display:block;
    margin-bottom:4px;
    font-size:13px;
    opacity:0.8;
  }
  .setup-step input, .setup-step select {
    width:100%;
    padding:6px 8px;
    border-radius:6px;
    border:none;
    background:#222;
    color:#eee;
  }
  .setup-buttons {
    margin-top:16px;
    display:flex;
    justify-content:space-between;
  }
  .btn {
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3a7bd5;
    color:#fff;
    font-weight:600;
  }
  .btn.secondary {
    background:#444;
  }

  /* Login screen */
  #login-screen {
    background: radial-gradient(circle at top, #222, #000);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-card {
    width:360px;
    background:#111;
    border-radius:12px;
    padding:20px 24px;
    box-shadow:0 0 20px #000;
    text-align:center;
  }
  .login-title {
    font-size:20px;
    margin-bottom:8px;
  }
  .login-user {
    font-size:16px;
    margin-bottom:12px;
    opacity:0.8;
  }
  .login-input {
    width:100%;
    padding:6px 8px;
    border-radius:6px;
    border:none;
    background:#222;
    color:#eee;
    margin-bottom:10px;
    text-align:center;
    letter-spacing:3px;
  }

  /* OS shell */
  #os-shell {
    display:none;
  }
  #desktop {
    position:absolute;
    top:0;
    bottom:40px;
    left:0;
    right:0;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
  }
  .icon {
    width:80px;
    text-align:center;
    color:#eee;
    cursor:pointer;
    margin:10px;
  }
  .icon-box {
    width:42px;
    height:42px;
    background:#333;
    border-radius:8px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
  }
  #taskbar {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:40px;
    background:#1b1b1b;
    display:flex;
    align-items:center;
    padding:0 10px;
    color:#eee;
    gap:8px;
    box-shadow:0 -2px 6px #000;
  }
  .task-item {
    padding:4px 10px;
    background:#333;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
  }
  .task-item.active {
    background:#555;
  }

  .window {
    position:absolute;
    width:900px;
    height:550px;
    background:#2b2b2b;
    border-radius:6px;
    box-shadow:0 0 10px #000;
    display:flex;
    flex-direction:column;
  }
  .titlebar {
    height:28px;
    background:#444;
    color:#eee;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 8px;
    cursor:move;
  }
  .title-left {
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
  }
  .title-controls {
    display:flex;
    gap:4px;
  }
  .btn-circle {
    width:16px;
    height:16px;
    border-radius:50%;
    cursor:pointer;
  }
  .btn-close { background:#e74c3c; }
  .btn-min { background:#f1c40f; }
  .btn-max { background:#2ecc71; }
  .content {
    flex:1;
    background:#1e1e1e;
    display:flex;
    flex-direction:column;
  }

  /* Cookie Browser UI */
  .tabbar {
    display:flex;
    align-items:center;
    gap:4px;
    padding:4px;
    background:#333;
  }
  .tab {
    padding:4px 8px;
    background:#444;
    border-radius:4px;
    color:#eee;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
  }
  .tab.active { background:#666; }
  .tab .close-tab {
    font-size:12px;
    cursor:pointer;
  }
  .tab-controls {
    margin-left:auto;
    display:flex;
    gap:4px;
  }
  .tab-controls button {
    padding:2px 6px;
    font-size:11px;
  }
  #browser-bar {
    display:flex;
    gap:6px;
    padding:6px;
    background:#333;
  }
  #browser-url {
    flex:1;
    padding:4px;
    border:none;
    border-radius:4px;
    background:#555;
    color:#eee;
  }
  #browser-url:focus { outline:none; }
  .browser-buttons button {
    padding:4px 8px;
    font-size:12px;
  }
  webview {
    width:100%;
    height:100%;
  }

  /* Music app */
  button {
    background:#444;
    color:#eee;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  button:hover { background:#555; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-title">Welcome to Tensley OS 3</div>
    <div id="setup-step-text" style="opacity:0.8; margin-bottom:10px;">
      Let’s get your PC ready.
    </div>

    <div id="setup-fields"></div>

    <div class="setup-buttons">
      <button class="btn secondary" id="setup-back">Back</button>
      <button class="btn" id="setup-next">Next</button>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">Tensley OS 3</div>
    <div class="login-user" id="login-username"></div>
    <input type="password" id="login-pin" class="login-input" placeholder="Enter PIN">
    <button class="btn" id="login-btn">Unlock</button>
    <div id="login-error" style="margin-top:8px; font-size:12px; color:#e74c3c; display:none;">
      Incorrect PIN.
    </div>
  </div>
</div>

<!-- OS SHELL -->
<div id="os-shell">
  <div id="desktop"></div>
  <div id="taskbar"></div>
</div>

<script>
/* ====== STATE & STORAGE ====== */
const STORAGE_KEY = "tensley_os_3_profile";

let profile = {
  deviceName: "",
  username: "",
  pin: "",
  wallpaper: "default",
  theme: "dark",
  accent: "#3a7bd5",
  defaultApps: ["browser", "music"],
  privacy: "balanced",
  setupDone: false,
  lastUrl: "https://google.com",
  installedApps: []
};

function loadProfile() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const data = JSON.parse(raw);
      profile = Object.assign(profile, data);
    } catch {}
  }
}

function saveProfile() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
}

/* ====== SETUP WIZARD ====== */
const setupScreen = document.getElementById("setup-screen");
const loginScreen = document.getElementById("login-screen");
const osShell = document.getElementById("os-shell");
const setupFields = document.getElementById("setup-fields");
const setupStepText = document.getElementById("setup-step-text");
const setupBack = document.getElementById("setup-back");
const setupNext = document.getElementById("setup-next");

let setupStep = 0;

const steps = [
  "Welcome to Tensley OS 3",
  "Choose device name",
  "Choose username",
  "Choose profile picture (simple label)",
  "Create PIN",
  "Choose wallpaper",
  "Choose theme",
  "Choose accent color",
  "Choose default apps",
  "Privacy settings"
];

function renderSetupStep() {
  setupFields.innerHTML = "";
  setupStepText.textContent = steps[setupStep];

  setupBack.style.visibility = setupStep === 0 ? "hidden" : "visible";
  setupNext.textContent = setupStep === steps.length - 1 ? "Finish" : "Next";

  switch (setupStep) {
    case 0:
      setupFields.innerHTML = `
        <div class="setup-step">
          <p>We’ll walk through a few steps to personalize Tensley OS 3.</p>
        </div>
      `;
      break;
    case 1:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Device name</label>
          <input id="setup-device" placeholder="e.g. TENSLEY-PC">
        </div>
      `;
      document.getElementById("setup-device").value = profile.deviceName || "";
      break;
    case 2:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Username</label>
          <input id="setup-username" placeholder="Your name">
        </div>
      `;
      document.getElementById("setup-username").value = profile.username || "";
      break;
    case 3:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Profile label (just text for now)</label>
          <input id="setup-profile-label" placeholder="e.g. Explorer, Gamer, Creator">
        </div>
      `;
      break;
    case 4:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Create PIN</label>
          <input id="setup-pin" type="password" placeholder="4+ digits">
        </div>
      `;
      document.getElementById("setup-pin").value = profile.pin || "";
      break;
    case 5:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Wallpaper</label>
          <select id="setup-wallpaper">
            <option value="default">Default</option>
            <option value="blue">Blue glow</option>
            <option value="purple">Purple nebula</option>
          </select>
        </div>
      `;
      document.getElementById("setup-wallpaper").value = profile.wallpaper || "default";
      break;
    case 6:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Theme</label>
          <select id="setup-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
      `;
      document.getElementById("setup-theme").value = profile.theme || "dark";
      break;
    case 7:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Accent color</label>
          <input id="setup-accent" type="color" value="${profile.accent}">
        </div>
      `;
      break;
    case 8:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Default apps</label>
          <div>
            <label><input type="checkbox" id="app-browser" checked> Cookie Browser</label><br>
            <label><input type="checkbox" id="app-music" checked> Music Player</label>
          </div>
        </div>
      `;
      break;
    case 9:
      setupFields.innerHTML = `
        <div class="setup-step">
          <label>Privacy level</label>
          <select id="setup-privacy">
            <option value="minimal">Minimal</option>
            <option value="balanced" selected>Balanced</option>
            <option value="full">Full diagnostics</option>
          </select>
        </div>
      `;
      break;
  }
}

setupBack.addEventListener("click", () => {
  if (setupStep > 0) {
    setupStep--;
    renderSetupStep();
  }
});

setupNext.addEventListener("click", () => {
  switch (setupStep) {
    case 1:
      profile.deviceName = document.getElementById("setup-device").value.trim() || "TENSLEY-PC";
      break;
    case 2:
      profile.username = document.getElementById("setup-username").value.trim() || "User";
      break;
    case 4:
      profile.pin = document.getElementById("setup-pin").value.trim() || "0000";
      break;
    case 5:
      profile.wallpaper = document.getElementById("setup-wallpaper").value;
      break;
    case 6:
      profile.theme = document.getElementById("setup-theme").value;
      break;
    case 7:
      profile.accent = document.getElementById("setup-accent").value;
      break;
    case 8:
      const apps = [];
      if (document.getElementById("app-browser").checked) apps.push("browser");
      if (document.getElementById("app-music").checked) apps.push("music");
      profile.defaultApps = apps;
      break;
    case 9:
      profile.privacy = document.getElementById("setup-privacy").value;
      break;
  }

  if (setupStep < steps.length - 1) {
    setupStep++;
    renderSetupStep();
  } else {
    profile.setupDone = true;
    saveProfile();
    showLogin();
  }
});

/* ====== LOGIN ====== */
const loginUsername = document.getElementById("login-username");
const loginPin = document.getElementById("login-pin");
const loginBtn = document.getElementById("login-btn");
const loginError = document.getElementById("login-error");

function showLogin() {
  setupScreen.style.display = "none";
  loginScreen.style.display = "flex";
  osShell.style.display = "none";
  loginUsername.textContent = profile.username + " on " + profile.deviceName;
  loginPin.value = "";
  loginError.style.display = "none";
}

loginBtn.addEventListener("click", () => {
  if (loginPin.value.trim() === profile.pin) {
    loginError.style.display = "none";
    showOS();
  } else {
    loginError.style.display = "block";
  }
});

/* ====== OS SHELL ====== */
const desktop = document.getElementById("desktop");
const taskbar = document.getElementById("taskbar");

let z = 10;
let windows = [];
let nextWindowId = 1;

function applyWallpaperAndTheme() {
  if (profile.theme === "light") {
    document.body.style.color = "#111";
  } else {
    document.body.style.color = "#eee";
  }

  let bg;
  switch (profile.wallpaper) {
    case "blue":
      bg = "radial-gradient(circle at top, #3a7bd5, #000)";
      break;
    case "purple":
      bg = "radial-gradient(circle at top, #8e44ad, #000)";
      break;
    default:
      bg = "radial-gradient(circle at top, #222, #000)";
  }
  document.body.style.background = bg;
}

function showOS() {
  loginScreen.style.display = "none";
  setupScreen.style.display = "none";
  osShell.style.display = "block";
  applyWallpaperAndTheme();
  initDesktop();
}

/* ====== TASKBAR & WINDOWS ====== */
function createTaskItem(winId, title) {
  const item = document.createElement("div");
  item.className = "task-item";
  item.textContent = title;
  item.dataset.winId = winId;
  item.addEventListener("click", () => {
    const winObj = windows.find(w => w.id == winId);
    if (!winObj) return;
    winObj.el.style.display = "block";
    winObj.el.style.zIndex = ++z;
    document.querySelectorAll(".task-item").forEach(t => t.classList.remove("active"));
    item.classList.add("active");
  });
  taskbar.appendChild(item);
  return item;
}

function updateTaskbarActive(winId) {
  document.querySelectorAll(".task-item").forEach(t => {
    t.classList.toggle("active", t.dataset.winId == winId);
  });
}

/* ====== DESKTOP ICONS ====== */
function initDesktop() {
  desktop.innerHTML = "";
  taskbar.innerHTML = "";

  const cookieIcon = document.createElement("div");
  cookieIcon.className = "icon";
  cookieIcon.innerHTML = `
    <div class="icon-box">🍪</div>
    Cookie Browser
  `;
  desktop.appendChild(cookieIcon);
  cookieIcon.addEventListener("dblclick", () => {
    createCookieBrowserWindow();
  });

  const musicIcon = document.createElement("div");
  musicIcon.className = "icon";
  musicIcon.innerHTML = `
    <div class="icon-box">🎵</div>
    Music
  `;
  desktop.appendChild(musicIcon);
  musicIcon.addEventListener("dblclick", () => {
    createMusicWindow();
  });

  // App Store icon
  const storeIcon = document.createElement("div");
  storeIcon.className = "icon";
  storeIcon.innerHTML = `
    <div class="icon-box">🛒</div>
    App Store
  `;
  desktop.appendChild(storeIcon);
  storeIcon.addEventListener("dblclick", () => {
    createAppStoreWindow();
  });

  // Render installed apps as icons
  profile.installedApps.forEach(appId => {
    createAppDesktopIcon(appId);
  });
}

/* ====== COOKIE BROWSER ====== */
function createCookieBrowserWindow() {
  const winId = nextWindowId++;
  const win = document.createElement("div");
  win.className = "window";
  win.style.left = "80px";
  win.style.top = "60px";
  win.style.zIndex = ++z;

  const titlebar = document.createElement("div");
  titlebar.className = "titlebar";

  const titleLeft = document.createElement("div");
  titleLeft.className = "title-left";
  const iconSpan = document.createElement("span");
  iconSpan.textContent = "🍪";
  const titleSpan = document.createElement("span");
  titleSpan.textContent = "Cookie Browser";
  titleLeft.appendChild(iconSpan);
  titleLeft.appendChild(titleSpan);

  const controls = document.createElement("div");
  controls.className = "title-controls";
  const btnMin = document.createElement("div");
  btnMin.className = "btn-circle btn-min";
  const btnMax = document.createElement("div");
  btnMax.className = "btn-circle btn-max";
  const btnClose = document.createElement("div");
  btnClose.className = "btn-circle btn-close";
  controls.appendChild(btnMin);
  controls.appendChild(btnMax);
  controls.appendChild(btnClose);

  titlebar.appendChild(titleLeft);
  titlebar.appendChild(controls);

  const content = document.createElement("div");
  content.className = "content";

  const tabbar = document.createElement("div");
  tabbar.className = "tabbar";

  const tabControls = document.createElement("div");
  tabControls.className = "tab-controls";
  const btnNewTab = document.createElement("button");
  btnNewTab.textContent = "+ Tab";
  const btnHideTabs = document.createElement("button");
  btnHideTabs.textContent = "Hide Tabs";
  tabControls.appendChild(btnNewTab);
  tabControls.appendChild(btnHideTabs);

  tabbar.appendChild(tabControls);

  const browserBar = document.createElement("div");
  browserBar.id = "browser-bar";

  const urlInput = document.createElement("input");
  urlInput.id = "browser-url";
  urlInput.placeholder = "Enter URL (e.g. https://google.com)";
  urlInput.value = profile.lastUrl || "https://google.com";

  const browserButtons = document.createElement("div");
  browserButtons.className = "browser-buttons";
  const btnGo = document.createElement("button");
  btnGo.textContent = "Go";
  const btnRefresh = document.createElement("button");
  btnRefresh.textContent = "Refresh";
  browserButtons.appendChild(btnGo);
  browserButtons.appendChild(btnRefresh);

  browserBar.appendChild(urlInput);
  browserBar.appendChild(browserButtons);

  const view = document.createElement("webview");
  view.id = "browser-view";
  view.src = profile.lastUrl || "https://google.com";
  view.setAttribute("allowpopups", "true");

  content.appendChild(tabbar);
  content.appendChild(browserBar);
  content.appendChild(view);

  win.appendChild(titlebar);
  win.appendChild(content);
  document.body.appendChild(win);

  const taskItem = createTaskItem(winId, "Cookie Browser");
  windows.push({ id: winId, el: win, taskItem, tabs: [], activeTabId: null });

  let drag = false, offX = 0, offY = 0;
  titlebar.addEventListener("mousedown", (e) => {
    drag = true;
    offX = e.clientX - win.offsetLeft;
    offY = e.clientY - win.offsetTop;
    win.style.zIndex = ++z;
    updateTaskbarActive(winId);
  });
  document.addEventListener("mouseup", () => drag = false);
  document.addEventListener("mousemove", (e) => {
    if (drag) {
      win.style.left = (e.clientX - offX) + "px";
      win.style.top = (e.clientY - offY) + "px";
    }
  });

  btnClose.addEventListener("click", () => {
    win.remove();
    taskItem.remove();
    windows = windows.filter(w => w.id != winId);
  });

  btnMin.addEventListener("click", () => {
    win.style.display = "none";
    updateTaskbarActive(null);
  });

  btnMax.addEventListener("click", () => {
    if (!win.dataset.max) {
      win.dataset.old = JSON.stringify({
        left: win.style.left,
        top: win.style.top,
        width: win.style.width,
        height: win.style.height
      });
      win.style.left = "0";
      win.style.top = "0";
      win.style.width = "100%";
      win.style.height = "calc(100% - 40px)";
      win.dataset.max = "true";
    } else {
      const old = JSON.parse(win.dataset.old);
      win.style.left = old.left;
      win.style.top = old.top;
      win.style.width = old.width;
      win.style.height = old.height;
      win.dataset.max = "";
    }
  });

  function createTab(initialUrl = profile.lastUrl || "https://google.com") {
    const tabId = Date.now() + Math.random();
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.dataset.tabId = tabId;

    const label = document.createElement("span");
    label.textContent = "Tab";

    const closeBtn = document.createElement("span");
    closeBtn.className = "close-tab";
    closeBtn.textContent = "×";

    tab.appendChild(label);
    tab.appendChild(closeBtn);

    tabbar.insertBefore(tab, tabControls);

    tab.addEventListener("click", () => {
      setActiveTab(tabId);
    });

    closeBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      closeTab(tabId);
    });

    const winObj = windows.find(w => w.id == winId);
    winObj.tabs.push({ id: tabId, label, url: initialUrl });
    setActiveTab(tabId);
  }

  function setActiveTab(tabId) {
    const winObj = windows.find(w => w.id == winId);
    winObj.activeTabId = tabId;
    tabbar.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.tabId == tabId);
    });
    const tabData = winObj.tabs.find(t => t.id == tabId);
    if (tabData) {
      view.src = tabData.url;
      urlInput.value = tabData.url;
    }
    updateTaskbarActive(winId);
  }

  function closeTab(tabId) {
    const winObj = windows.find(w => w.id == winId);
    const idx = winObj.tabs.findIndex(t => t.id == tabId);
    if (idx === -1) return;
    winObj.tabs.splice(idx, 1);
    const tabEl = tabbar.querySelector(`.tab[data-tab-id="${tabId}"]`);
    if (tabEl) tabEl.remove();
    if (winObj.activeTabId == tabId) {
      if (winObj.tabs.length > 0) {
        setActiveTab(winObj.tabs[0].id);
      } else {
        view.src = "about:blank";
        urlInput.value = "";
        winObj.activeTabId = null;
      }
    }
  }

  btnNewTab.addEventListener("click", () => {
    createTab("https://google.com");
  });

  let tabsHidden = false;
  btnHideTabs.addEventListener("click", () => {
    tabsHidden = !tabsHidden;
    tabbar.style.display = tabsHidden ? "none" : "flex";
    btnHideTabs.textContent = tabsHidden ? "Show Tabs" : "Hide Tabs";
  });

  btnGo.addEventListener("click", () => {
    let url = urlInput.value.trim();
    if (!url.startsWith("http")) url = "https://" + url;
    profile.lastUrl = url;
    saveProfile();
    const winObj = windows.find(w => w.id == winId);
    if (winObj.activeTabId) {
      const tabData = winObj.tabs.find(t => t.id == winObj.activeTabId);
      if (tabData) {
        tabData.url = url;
        tabData.label.textContent = url.replace(/^https?:\/\//, "").split("/")[0];
      }
    }
    view.src = url;
  });

  urlInput.addEventListener("keydown", (e) => {

  titlebar.addEventListener("mousedown", (e) => {
    drag = true;
    offX = e.clientX - win.offsetLeft;
    offY = e.clientY - win.offsetTop;
    win.style.zIndex = ++z;
    updateTaskbarActive(winId);
  });
  document.addEventListener("mouseup", () => drag = false);
  document.addEventListener("mousemove", (e) => {
    if (drag) {
      win.style.left = (e.clientX - offX) + "px";
      win.style.top = (e.clientY - offY) + "px";
    }
  });

  btnClose.addEventListener("click", () => {
    win.remove();
    taskItem.remove();
    windows = windows.filter(w => w.id != winId);
  });

  btnMin.addEventListener("click", () => {
    win.style.display = "none";
    updateTaskbarActive(null);
  });

  btnMax.addEventListener("click", () => {
    if (!win.dataset.max) {
      win.dataset.old = JSON.stringify({
        left: win.style.left,
        top: win.style.top,
        width: win.style.width,
        height: win.style.height
      });
      win.style.left = "0";
      win.style.top = "0";
      win.style.width = "100%";
      win.style.height = "calc(100% - 40px)";
      win.dataset.max = "true";
    } else {
      const old = JSON.parse(win.dataset.old);
      win.style.left = old.left;
      win.style.top = old.top;
      win.style.width = old.width;
      win.style.height = old.height;
      win.dataset.max = "";
    }
  });

  const fileInput = content.querySelector("#music-file");
  const playlistDiv = content.querySelector("#playlist");
  const btnPlay = content.querySelector("#btn-play");
  const btnPrev = content.querySelector("#btn-prev");
  const btnNext = content.querySelector("#btn-next");

  let playlist = [];
  let currentIndex = 0;
  let audio = new Audio();

  fileInput.addEventListener("change", () => {
    playlist = Array.from(fileInput.files);
    playlistDiv.innerHTML = "";

    playlist.forEach((file, i) => {
      const item = document.createElement("div");
      item.style.padding = "6px";
      item.style.cursor = "pointer";
      item.style.borderBottom = "1px solid #444";
      item.textContent = file.name;

      item.addEventListener("click", () => {
        currentIndex = i;
        playSong();
      });

      playlistDiv.appendChild(item);
    });

    if (playlist.length === 0) {
      playlistDiv.innerHTML = `<p style="opacity:0.6;">No songs loaded.</p>`;
    }
  });

  function playSong() {
    if (playlist.length === 0) return;
    const file = playlist[currentIndex];
    audio.src = URL.createObjectURL(file);
    audio.play();
    btnPlay.textContent = "⏸ Pause";
  }

  btnPlay.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      btnPlay.textContent = "⏸ Pause";
    } else {
      audio.pause();
      btnPlay.textContent = "▶ Play";
    }
  });

  btnPrev.addEventListener("click", () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
    playSong();
  });

  btnNext.addEventListener("click", () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex + 1) % playlist.length;
    playSong();
  });
}

        printLine("Commands: help, clear, echo <text>, os, browser, music");

function createSnakeWindow() {
  const winId = nextWindowId++;
  const win = document.createElement("div");
  win.className = "window";
  win.style.left = "260px";
  win.style.top = "180px";
  win.style.width = "400px";
  win.style.height = "320px";
  win.style.zIndex = ++z;

  const titlebar = document.createElement("div");
  titlebar.className = "titlebar";
  const titleLeft = document.createElement("div");
  titleLeft.className = "title-left";
  titleLeft.innerHTML = "<span>🐍</span><span>Snake</span>";
  const controls = document.createElement("div");
  controls.className = "title-controls";
  const btnMin = document.createElement("div");
  btnMin.className = "btn-circle btn-min";
  const btnMax = document.createElement("div");
  btnMax.className = "btn-circle btn-max";
  const btnClose = document.createElement("div");
  btnClose.className = "btn-circle btn-close";
  controls.appendChild(btnMin); controls.appendChild(btnMax); controls.appendChild(btnClose);
  titlebar.appendChild(titleLeft); titlebar.appendChild(controls);

  const content = document.createElement("div");
  content.className = "content";
  content.style.padding = "10px";
  content.style.background = "#000";
  const canvas = document.createElement("canvas");
  canvas.width = 360;
  canvas.height = 240;
  canvas.style.background = "#111";
  content.appendChild(canvas);

  win.appendChild(titlebar); win.appendChild(content); document.body.appendChild(win);
  const taskItem = createTaskItem(winId, "Snake");
  windows.push({ id: winId, el: win, taskItem });

  let drag=false,offX=0,offY=0;
  titlebar.addEventListener("mousedown",e=>{drag=true;offX=e.clientX-win.offsetLeft;offY=e.clientY-win.offsetTop;win.style.zIndex=++z;updateTaskbarActive(winId);});
  document.addEventListener("mouseup",()=>drag=false);
  document.addEventListener("mousemove",e=>{if(drag){win.style.left=(e.clientX-offX)+"px";win.style.top=(e.clientY-offY)+"px";}});

  btnClose.addEventListener("click",()=>{win.remove();taskItem.remove();windows=windows.filter(w=>w.id!=winId);});
  btnMin.addEventListener("click",()=>{win.style.display="none";updateTaskbarActive(null);});
  btnMax.addEventListener("click",()=>{if(!win.dataset.max){win.dataset.old=JSON.stringify({left:win.style.left,top:win.style.top,width:win.style.width,height:win.style.height});win.style.left="0";win.style.top="0";win.style.width="100%";win.style.height="calc(100% - 40px)";win.dataset.max="true";}else{const old=JSON.parse(win.dataset.old);win.style.left=old.left;win.style.top=old.top;win.style.width=old.width;win.style.height=old.height;win.dataset.max="";}});

  const ctx = canvas.getContext("2d");
  const gridSize = 12;
  let snake = [{x:10,y:10}];
  let dir = {x:1,y:0};
  let food = {x:5,y:5};
  let running = true;

  function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#0f0";
    snake.forEach(s=>ctx.fillRect(s.x*gridSize,s.y*gridSize,gridSize-1,gridSize-1));

    ctx.fillStyle = "#f00";
    ctx.fillRect(food.x*gridSize,food.y*gridSize,gridSize-1,gridSize-1);
  }

  function step() {
    if (!running) return;
    const head = {x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if (head.x<0||head.y<0||head.x>=canvas.width/gridSize||head.y>=canvas.height/gridSize||snake.some(s=>s.x===head.x&&s.y===head.y)) {
      running=false;
      return;
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      food = {x:Math.floor(Math.random()*canvas.width/gridSize),y:Math.floor(Math.random()*canvas.height/gridSize)};
    } else {
      snake.pop();
    }
    draw();
  }

  draw();
  const interval = setInterval(step,150);

  document.addEventListener("keydown",e=>{
    if(!running)return;
    if(e.key==="ArrowUp" && dir.y!==1) dir={x:0,y:-1};
    if(e.key==="ArrowDown" && dir.y!==-1) dir={x:0,y:1};
    if(e.key==="ArrowLeft" && dir.x!==1) dir={x:-1,y:0};
    if(e.key==="ArrowRight" && dir.x!==-1) dir={x:1,y:0};
  });

  btnClose.addEventListener("click",()=>{clearInterval(interval);});
}
